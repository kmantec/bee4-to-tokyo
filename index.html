<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bee4 to Tokyo · ESB Trainer for Pingping</title>
<meta name="description" content="Eurasian Spelling Bee training app — Bee 3, 4, and 5 levels, all four tasks">
<meta name="theme-color" content="#0A2540">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bee4">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
        display: ['Fraunces', 'serif'],
        mono: ['JetBrains Mono', 'monospace'],
      },
      colors: {
        navy: {
          50:'#F0F4F9',  100:'#DCE5EF', 200:'#B8CCDF', 300:'#8AAEC9', 400:'#5A8AB3',
          500:'#0A2540', 600:'#081E35', 700:'#06182A', 800:'#04121F', 900:'#020914',
        },
        gold: '#B8985A',
        cream: '#FAFAF7',
      },
      animation: {
        'fade-in':  'fadeIn 0.5s ease-out',
        'slide-up': 'slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1)',
        'pop':      'pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
      },
      keyframes: {
        fadeIn:  { '0%':{opacity:0}, '100%':{opacity:1} },
        slideUp: { '0%':{transform:'translateY(12px)',opacity:0}, '100%':{transform:'translateY(0)',opacity:1} },
        pop:     { '0%':{transform:'scale(0.92)',opacity:0}, '60%':{transform:'scale(1.04)',opacity:1}, '100%':{transform:'scale(1)'} },
      }
    }
  }
}
</script>

<style>
:root {
  --ink: #0A2540;
  --cream: #FAFAF7;
  --gold: #B8985A;
  --nav-height: 68px;
}

* { box-sizing: border-box; }

html, body {
  background: #FAFAF7;
  color: #0A2540;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
  margin: 0;
  min-height: 100vh;
  min-height: 100dvh;
}

body {
  /* Lock body — each screen handles its own scroll */
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
}

/* FIT-TO-SCREEN: every render puts a .screen at root */
.screen {
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.screen-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
.screen.has-nav .screen-scroll { padding-bottom: var(--nav-height); }

@media (min-width: 768px)  { html { font-size: 16.5px; } }
@media (min-width: 1280px) { html { font-size: 16px; } }

.font-display { font-family: 'Fraunces', serif; font-feature-settings: "ss01"; }

body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    radial-gradient(circle at 20% 50%, rgba(10,37,64,0.02) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(184,152,90,0.015) 0%, transparent 50%);
}

#app, #bottomNav { position: relative; z-index: 1; }
#app { height: 100vh; height: 100dvh; }

.premium-card {
  background: white;
  border: 1px solid rgba(10,37,64,0.06);
  box-shadow: 0 1px 2px rgba(10,37,64,0.04), 0 4px 12px rgba(10,37,64,0.04);
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.premium-card:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 8px rgba(10,37,64,0.06), 0 12px 24px rgba(10,37,64,0.08);
}

.gold-line {
  background: linear-gradient(90deg, transparent, #B8985A, transparent);
  height: 1px;
}

.num-badge {
  font-family: 'Fraunces', serif;
  font-feature-settings: "ss01", "tnum";
  font-variant-numeric: tabular-nums;
}

.spell-input {
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.06em;
}
.spell-input:focus { outline: none; }

button, .btn-primary, .btn-secondary, .nav-btn { min-height: 44px; }

.btn-primary {
  background: #0A2540; color: white;
  transition: all 0.2s;
}
.btn-primary:hover { background: #081E35; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(10,37,64,0.2); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { background: #B8CCDF; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-primary:focus-visible { outline: 2px solid #B8985A; outline-offset: 2px; }

.btn-secondary {
  background: white; color: #0A2540;
  border: 1px solid rgba(10,37,64,0.12);
  transition: all 0.2s;
}
.btn-secondary:hover { background: #F0F4F9; border-color: rgba(10,37,64,0.2); }
.btn-secondary:focus-visible { outline: 2px solid #B8985A; outline-offset: 2px; }

input:focus-visible { outline: 2px solid #B8985A; outline-offset: 2px; }

.hero-gradient {
  background: linear-gradient(135deg, #0A2540 0%, #1a3856 50%, #0A2540 100%);
  background-size: 200% 200%;
  animation: gradientShift 8s ease-in-out infinite;
}
@keyframes gradientShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

.diagonal-pattern {
  background-image:
    repeating-linear-gradient(45deg, rgba(255,255,255,0.035), rgba(255,255,255,0.035) 1px, transparent 1px, transparent 12px),
    linear-gradient(135deg, #0A2540 0%, #1a3856 50%, #0A2540 100%);
}

.nav-btn { color: rgba(10,37,64,0.4); transition: all 0.2s; }
.nav-btn.active { color: #0A2540; background: rgba(10,37,64,0.08); }
#bottomNav {
  padding-bottom: env(safe-area-inset-bottom);
  box-shadow: 0 -4px 20px rgba(10,37,64,0.08);
  height: var(--nav-height);
}

::-webkit-scrollbar { width: 0; }
::selection { background: #0A2540; color: white; }

.passage-word {
  cursor: pointer;
  padding: 2px 4px; border-radius: 4px;
  transition: all 0.15s;
  display: inline-block;
}
.passage-word:hover    { background: rgba(10,37,64,0.06); }
.passage-word.flagged  { background: #FEF3C7; color: #92400E; font-weight: 600; text-decoration: underline wavy #F59E0B; }
.passage-word.confirmed-correct { background: #D1FAE5; color: #065F46; font-weight: 600; }
.passage-word.confirmed-wrong   { background: #FEE2E2; color: #991B1B; text-decoration: line-through; }

.level-pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.1em;
  padding: 2px 8px; border-radius: 999px;
  font-weight: 600;
}
.level-3 { background: #D1FAE5; color: #047857; }
.level-4 { background: #DBEAFE; color: #1E40AF; }
.level-5 { background: #FEF3C7; color: #92400E; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .hero-gradient { animation: none; }
}
</style>
</head>
<body>

<div id="app"></div>

<nav id="bottomNav" class="hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-lg border-t border-navy-100" role="navigation" aria-label="Main navigation">
  <div class="max-w-2xl mx-auto px-2 h-full">
    <div class="grid grid-cols-5 gap-1 h-full items-center">
      <button onclick="showScreen('home')" data-nav="home" class="nav-btn flex flex-col items-center justify-center py-1 rounded-xl transition" aria-label="Home">
        <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
        <span class="text-[10px] font-semibold tracking-wide uppercase">Home</span>
      </button>
      <button onclick="showScreen('train')" data-nav="train" class="nav-btn flex flex-col items-center justify-center py-1 rounded-xl transition" aria-label="Practice">
        <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"/></svg>
        <span class="text-[10px] font-semibold tracking-wide uppercase">Train</span>
      </button>
      <button onclick="showScreen('learn')" data-nav="learn" class="nav-btn flex flex-col items-center justify-center py-1 rounded-xl transition" aria-label="Learn">
        <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9 4.5c-3 0-5 2-5 5 0 1.6.7 3 1.7 4 .8.7 1.3 1.7 1.3 2.7v.3c0 .8.7 1.5 1.5 1.5h3c.8 0 1.5-.7 1.5-1.5v-.3c0-1 .5-2 1.3-2.7 1-1 1.7-2.4 1.7-4 0-3-2-5-5-5z"/></svg>
        <span class="text-[10px] font-semibold tracking-wide uppercase">Learn</span>
      </button>
      <button onclick="showScreen('mock')" data-nav="mock" class="nav-btn flex flex-col items-center justify-center py-1 rounded-xl transition" aria-label="Mock test">
        <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 18.75h-9m9 0a3 3 0 0 1 3 3h-15a3 3 0 0 1 3-3m9 0v-3.375c0-.621-.503-1.125-1.125-1.125h-.871M7.5 18.75v-3.375c0-.621.504-1.125 1.125-1.125h.872m5.007 0H9.497"/></svg>
        <span class="text-[10px] font-semibold tracking-wide uppercase">Mock</span>
      </button>
      <button onclick="showScreen('progress')" data-nav="progress" class="nav-btn flex flex-col items-center justify-center py-1 rounded-xl transition" aria-label="Progress">
        <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z"/></svg>
        <span class="text-[10px] font-semibold tracking-wide uppercase">Progress</span>
      </button>
    </div>
  </div>
</nav>

<script type="module" src="./js/app.js"></script>
</body>
</html>

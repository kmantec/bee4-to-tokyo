<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bee4 to Tokyo</title>
<meta name="description" content="ESB Bee 4 spelling competition trainer">
<meta name="theme-color" content="#0A2540">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
        display: ['Fraunces', 'serif'],
        mono: ['JetBrains Mono', 'monospace'],
      },
      colors: {
        navy: {
          50:  '#F0F4F9',
          100: '#DCE5EF',
          200: '#B8CCDF',
          300: '#8AAEC9',
          400: '#5A8AB3',
          500: '#0A2540',
          600: '#081E35',
          700: '#06182A',
          800: '#04121F',
          900: '#020914',
        },
        gold: '#B8985A',
        cream: '#FAFAF7',
      },
      animation: {
        'fade-in':  'fadeIn 0.5s ease-out',
        'slide-up': 'slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1)',
        'pop':      'pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
      },
      keyframes: {
        fadeIn:  { '0%':{opacity:0}, '100%':{opacity:1} },
        slideUp: { '0%':{transform:'translateY(12px)',opacity:0}, '100%':{transform:'translateY(0)',opacity:1} },
        pop:     { '0%':{transform:'scale(0.92)',opacity:0}, '60%':{transform:'scale(1.04)',opacity:1}, '100%':{transform:'scale(1)'} },
      }
    }
  }
}
</script>

<style>
:root {
  --ink: #0A2540;
  --cream: #FAFAF7;
  --gold: #B8985A;
}

html, body {
  background: #FAFAF7;
  color: #0A2540;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

.font-display { font-family: 'Fraunces', serif; font-feature-settings: "ss01"; }

body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    radial-gradient(circle at 20% 50%, rgba(10,37,64,0.02) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(184,152,90,0.015) 0%, transparent 50%);
}

#app, #bottomNav { position: relative; z-index: 1; }

.premium-card {
  background: white;
  border: 1px solid rgba(10,37,64,0.06);
  box-shadow: 0 1px 2px rgba(10,37,64,0.04), 0 4px 12px rgba(10,37,64,0.04);
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.premium-card:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 8px rgba(10,37,64,0.06), 0 12px 24px rgba(10,37,64,0.08);
}

.gold-line {
  background: linear-gradient(90deg, transparent, #B8985A, transparent);
  height: 1px;
}

.num-badge {
  font-family: 'Fraunces', serif;
  font-feature-settings: "ss01", "tnum";
  font-variant-numeric: tabular-nums;
}

.spell-input {
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.06em;
}
.spell-input:focus { outline: none; }

.btn-primary {
  background: #0A2540;
  color: white;
  transition: all 0.2s;
}
.btn-primary:hover { background: #081E35; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(10,37,64,0.2); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { background: #B8CCDF; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-secondary {
  background: white;
  color: #0A2540;
  border: 1px solid rgba(10,37,64,0.12);
  transition: all 0.2s;
}
.btn-secondary:hover { background: #F0F4F9; border-color: rgba(10,37,64,0.2); }

.hero-gradient {
  background: linear-gradient(135deg, #0A2540 0%, #1a3856 50%, #0A2540 100%);
  background-size: 200% 200%;
  animation: gradientShift 8s ease-in-out infinite;
}
@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.diagonal-pattern {
  background-image:
    repeating-linear-gradient(45deg, rgba(255,255,255,0.035), rgba(255,255,255,0.035) 1px, transparent 1px, transparent 12px),
    linear-gradient(135deg, #0A2540 0%, #1a3856 50%, #0A2540 100%);
}

.nav-btn { color: rgba(10,37,64,0.4); transition: all 0.2s; }
.nav-btn.active { color: #0A2540; background: rgba(10,37,64,0.08); }
#bottomNav { padding-bottom: env(safe-area-inset-bottom); box-shadow: 0 -4px 20px rgba(10,37,64,0.08); }

::-webkit-scrollbar { width: 0; }
::selection { background: #0A2540; color: white; }

/* Word click target for Spot the Error */
.passage-word {
  cursor: pointer;
  padding: 1px 3px;
  border-radius: 4px;
  transition: all 0.15s;
  display: inline-block;
}
.passage-word:hover {
  background: rgba(10,37,64,0.06);
}
.passage-word.flagged {
  background: #FEF3C7;
  color: #92400E;
  font-weight: 600;
  text-decoration: underline wavy #F59E0B;
}
.passage-word.confirmed-correct {
  background: #D1FAE5;
  color: #065F46;
  font-weight: 600;
}
.passage-word.confirmed-wrong {
  background: #FEE2E2;
  color: #991B1B;
  text-decoration: line-through;
}

/* Level pill */
.level-pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  padding: 2px 8px;
  border-radius: 999px;
  font-weight: 600;
}
.level-3 { background: #D1FAE5; color: #047857; }
.level-4 { background: #DBEAFE; color: #1E40AF; }
.level-5 { background: #FEF3C7; color: #92400E; }
</style>
</head>
<body class="min-h-screen">

<div id="app" class="max-w-md mx-auto min-h-screen pb-24"></div>

<!-- Bottom navigation -->
<nav id="bottomNav" class="hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-lg border-t border-navy-100 max-w-md mx-auto">
  <div class="grid grid-cols-4 gap-1 p-2">
    <button onclick="showScreen('home')" data-nav="home" class="nav-btn flex flex-col items-center py-2 rounded-xl transition">
      <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
      <span class="text-[10px] font-semibold tracking-wide uppercase">Home</span>
    </button>
    <button onclick="showScreen('train')" data-nav="train" class="nav-btn flex flex-col items-center py-2 rounded-xl transition">
      <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"/></svg>
      <span class="text-[10px] font-semibold tracking-wide uppercase">Train</span>
    </button>
    <button onclick="showScreen('mock')" data-nav="mock" class="nav-btn flex flex-col items-center py-2 rounded-xl transition">
      <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 18.75h-9m9 0a3 3 0 0 1 3 3h-15a3 3 0 0 1 3-3m9 0v-3.375c0-.621-.503-1.125-1.125-1.125h-.871M7.5 18.75v-3.375c0-.621.504-1.125 1.125-1.125h.872m5.007 0H9.497m5.007 0a7.454 7.454 0 0 1-.982-3.172M9.497 14.25a7.454 7.454 0 0 0 .981-3.172M5.25 4.236c-.982.143-1.954.317-2.916.52A6.003 6.003 0 0 0 7.73 9.728M5.25 4.236V4.5c0 2.108.966 3.99 2.48 5.228M5.25 4.236V2.721C7.456 2.41 9.71 2.25 12 2.25c2.291 0 4.545.16 6.75.47v1.516M7.73 9.728a6.726 6.726 0 0 0 2.748 1.35m8.272-6.842V4.5c0 2.108-.966 3.99-2.48 5.228m2.48-5.492a46.32 46.32 0 0 1 2.916.52 6.003 6.003 0 0 1-5.395 4.972m0 0a6.726 6.726 0 0 1-2.749 1.35m0 0a6.772 6.772 0 0 1-3.044 0"/></svg>
      <span class="text-[10px] font-semibold tracking-wide uppercase">Mock</span>
    </button>
    <button onclick="showScreen('progress')" data-nav="progress" class="nav-btn flex flex-col items-center py-2 rounded-xl transition">
      <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z"/></svg>
      <span class="text-[10px] font-semibold tracking-wide uppercase">Progress</span>
    </button>
  </div>
</nav>

<script type="module" src="./js/app.js"></script>
</body>
</html>
